name: Join Waitlist
description: Join the Lantern waitlist
title: "Waitlist: [Your Email]"
labels: ["waitlist"]
body:
  - type: input
    id: email
    attributes:
      label: Your Email
      description: We'll email you when the beta opens
      placeholder: you@example.com
    validations:
      required: true
  - type: input
    id: use_case
    attributes:
      label: What's your biggest accessibility challenge?
      placeholder: e.g., "Our site needs to meet WCAG 2.1 AA"
    validations:
      required: false
